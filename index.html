<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ניתוח שוק">
<meta name="mobile-web-app-capable" content="yes">
<title>סוכן ניתוח שוק</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0d0d0d;
    --surface:     #141414;
    --surface2:    #1c1c1c;
    --border:      #252525;
    --border-soft: #2e2e2e;
    --accent:      #4f8ef7;
    --accent-dark: #3a7ae0;
    --accent-dim:  rgba(79,142,247,0.14);
    --accent-glow: rgba(79,142,247,0.28);
    --success:     #3ecf8e;
    --error:       #f56363;
    --text:        #e8e8e0;
    --text-dim:    #777;
    --text-muted:  #3d3d3d;
    --radius:      14px;
    --radius-lg:   18px;
    --font:        'Heebo', sans-serif;
    --safe-top:    env(safe-area-inset-top,    0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--font); direction: rtl;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    transition: opacity .3s ease, transform .3s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(14px); }

  /* ══════════════════════════════
     SETUP SCREEN
  ══════════════════════════════ */
  #setup {
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 22%, #0a1a35 0%, var(--bg) 65%);
    padding: calc(24px + var(--safe-top)) 28px calc(28px + var(--safe-bottom));
    gap: 42px;
  }

  .setup-logo { text-align: center; }
  .setup-icon {
    font-size: 56px; line-height: 1; margin-bottom: 18px;
    filter: drop-shadow(0 0 36px rgba(79,142,247,.4));
    display: block;
  }
  .setup-title {
    font-size: 34px; font-weight: 700; letter-spacing: -.04em;
    color: var(--accent); line-height: 1;
    text-shadow: 0 0 48px var(--accent-glow);
  }
  .setup-sub {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: .2em; margin-top: 9px; font-weight: 300;
    text-transform: uppercase;
  }

  .setup-form { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 11px; }
  .form-label { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; }
  .form-input {
    width: 100%; padding: 15px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 15px;
    direction: ltr; text-align: left; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .form-input::placeholder { color: var(--text-muted); direction: rtl; text-align: right; }

  .setup-hint {
    font-size: 12px; color: var(--text-dim); line-height: 1.55;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 15px;
  }
  .setup-hint a { color: var(--accent); text-decoration: none; }

  .btn-primary {
    width: 100%; padding: 15px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .3px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); opacity: .85; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  /* ══════════════════════════════
     MAIN SCREEN
  ══════════════════════════════ */
  #main { background: var(--bg); }

  /* Header */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(13px + var(--safe-top)) 16px 13px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0; z-index: 10;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #0c1f42, #1a3c7a);
    border: 1px solid rgba(79,142,247,.28);
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .header-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-sub  { font-size: 10px; color: var(--text-dim); margin-top: 1px; letter-spacing: .05em; }
  .btn-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .btn-icon:hover { border-color: var(--border-soft); color: var(--text); background: var(--surface); }

  /* Scroll area */
  .main-scroll {
    flex: 1; overflow-y: auto;
    padding: 16px 16px calc(20px + var(--safe-bottom));
    display: flex; flex-direction: column;
  }
  .main-scroll::-webkit-scrollbar { width: 0; }

  /* Search bar */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-input {
    flex: 1; height: 50px; padding: 0 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 15px; direction: rtl;
    outline: none; transition: border-color .2s, box-shadow .2s;
    min-width: 0;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .search-input::placeholder { color: var(--text-muted); }
  .btn-analyze {
    height: 50px; padding: 0 20px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-family: var(--font); font-size: 15px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: opacity .2s, transform .1s;
  }
  .btn-analyze:hover { opacity: .88; }
  .btn-analyze:active { transform: scale(.98); }
  .btn-analyze:disabled { opacity: .38; cursor: not-allowed; transform: none; }

  /* Chips */
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
  .chip {
    font-size: 12px; padding: 5px 13px;
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-dim); cursor: pointer;
    background: transparent; font-family: var(--font);
    transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* Status */
  .status-line {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-dim);
    min-height: 22px; margin-bottom: 12px;
  }
  .loader {
    width: 14px; height: 14px;
    border: 2px solid var(--border-soft);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result card */
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 18px;
    margin-bottom: 14px; animation: fadeUp .28s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 13px; gap: 10px;
  }
  .card-topic {
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-dim);
    padding: 3px 10px; border-radius: 20px; flex-shrink: 0;
  }
  .card-time { font-size: 11px; color: var(--text-muted); padding-top: 3px; }

  .card-title {
    font-size: 18px; font-weight: 700; letter-spacing: -.015em;
    line-height: 1.4; margin-bottom: 11px;
  }
  .card-summary {
    font-size: 14px; line-height: 1.75; color: var(--text-dim);
    margin-bottom: 17px; font-weight: 300;
  }

  .points-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 9px;
  }
  .points-list { list-style: none; margin-bottom: 14px; }
  .point-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px; line-height: 1.6;
  }
  .point-item:last-child { border-bottom: none; }
  .point-num {
    font-size: 10px; font-weight: 600; color: var(--accent);
    background: var(--accent-dim); border-radius: 4px;
    padding: 2px 7px; margin-top: 3px; flex-shrink: 0;
  }

  .card-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .btn-action {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 7px 13px;
    border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text-dim);
    font-family: var(--font); cursor: pointer; transition: all .15s;
  }
  .btn-action:hover  { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-action.active { border-color: var(--success); color: var(--success); }

  /* Error */
  .error-card {
    background: rgba(245,99,99,.07); border: 1px solid rgba(245,99,99,.18);
    border-radius: var(--radius); padding: 14px 16px; font-size: 13px;
    color: var(--error); margin-bottom: 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .error-icon { flex-shrink: 0; margin-top: 1px; }
  .btn-retry {
    margin-top: 9px; font-size: 12px; padding: 5px 12px;
    border: 1px solid rgba(245,99,99,.3); border-radius: 8px;
    background: transparent; color: var(--error);
    font-family: var(--font); cursor: pointer; display: inline-block;
    transition: background .15s;
  }
  .btn-retry:hover { background: rgba(245,99,99,.1); }

  /* History */
  .section-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 9px; margin-top: 4px;
  }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 6px;
    cursor: pointer; transition: all .15s; gap: 12px;
  }
  .history-item:hover { border-color: var(--border-soft); background: var(--surface); }
  .history-title {
    font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

  /* ══════════════════════════════
     SETTINGS BOTTOM SHEET
  ══════════════════════════════ */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    z-index: 200; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    width: 100%;
    background: var(--surface); border-radius: 20px 20px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    padding: 0 20px calc(18px + var(--safe-bottom));
    transform: translateY(100%); transition: transform .3s ease;
    max-height: 75vh; overflow-y: auto;
  }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 20px;
  }
  .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .sheet-label { font-size: 12px; color: var(--text-dim); margin-bottom: 7px; }
  .sheet-input {
    width: 100%; padding: 13px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 14px;
    direction: ltr; text-align: left; outline: none;
    transition: border-color .2s; margin-bottom: 14px;
  }
  .sheet-input:focus { border-color: var(--accent); }
  .btn-danger {
    width: 100%; padding: 13px; margin-top: 8px;
    background: transparent; border: 1px solid rgba(245,99,99,.3);
    border-radius: var(--radius); color: var(--error);
    font-family: var(--font); font-size: 14px;
    cursor: pointer; transition: background .15s;
  }
  .btn-danger:hover { background: rgba(245,99,99,.08); }

  /* Sites input */
  .sites-input {
    width: 100%; height: 42px; padding: 0 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 13px; direction: rtl;
    outline: none; transition: border-color .2s, box-shadow .2s;
    margin-bottom: 10px;
  }
  .sites-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .sites-input::placeholder { color: var(--text-muted); font-size: 12px; }

  /* Deep mode toggle */
  .mode-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .mode-label { font-size: 12px; color: var(--text-dim); }
  .btn-mode {
    font-size: 12px; padding: 5px 14px;
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--text-dim); cursor: pointer;
    background: transparent; font-family: var(--font);
    transition: all .2s;
  }
  .btn-mode.deep-active {
    border-color: var(--accent); color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Desktop tweak ── */
  @media (min-width: 600px) {
    .main-scroll { max-width: 680px; width: 100%; margin: 0 auto; align-self: center; }
    .sheet {
      max-width: 440px; left: 50%; right: auto;
      border-radius: 20px; border: 1px solid var(--border);
      margin-bottom: 24px; position: relative;
    }
    .overlay { align-items: center; justify-content: center; }
    .overlay .sheet { transform: scale(.95) translateY(10px); }
    .overlay.open .sheet { transform: scale(1) translateY(0); }
  }

  /* ── Custom chips manager ── */
  .custom-chip-row {
    display: flex; gap: 7px; margin-bottom: 10px;
  }
  .custom-chip-input {
    flex: 1; height: 38px; padding: 0 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 13px; direction: rtl;
    outline: none; transition: border-color .2s;
  }
  .custom-chip-input:focus { border-color: var(--accent); }
  .btn-add-chip {
    height: 38px; padding: 0 14px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: opacity .2s;
  }
  .btn-add-chip:hover { opacity: .88; }
  .custom-chips-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
  .custom-chip-tag {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 4px 10px;
    border: 1px solid var(--accent); border-radius: 20px;
    color: var(--accent); background: var(--accent-dim);
  }
  .remove-custom-chip {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 13px; padding: 0 2px; line-height: 1;
  }

  /* ── Comparison card ── */
  .compare-card {
    background: var(--surface2); border: 1px solid var(--border-soft);
    border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 14px; animation: fadeUp .28s ease;
  }
  .compare-title {
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px;
  }
  .compare-row {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 13px; padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .compare-row:last-child { border-bottom: none; }
  .compare-badge {
    font-size: 10px; font-weight: 700; border-radius: 4px;
    padding: 2px 6px; flex-shrink: 0; margin-top: 2px;
  }
  .badge-new  { background: rgba(62,207,142,.15); color: var(--success); }
  .badge-gone { background: rgba(245,99,99,.1);   color: var(--error);   }
  .badge-same { background: var(--accent-dim);    color: var(--text-dim);}
  .compare-prev-time { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

  /* ── Chat with agent about the analysis ── */
  .chat-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .chat-label {
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .chat-log { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .chat-msg { display: flex; }
  .chat-msg.chat-user { justify-content: flex-end; }
  .chat-msg.chat-assistant, .chat-msg.chat-error { justify-content: flex-start; }
  .chat-bubble {
    max-width: 88%; font-size: 13px; line-height: 1.6;
    padding: 9px 13px; border-radius: 12px; white-space: pre-wrap;
  }
  .chat-user .chat-bubble {
    background: var(--accent-dim); color: var(--text); border: 1px solid rgba(79,142,247,.25);
  }
  .chat-assistant .chat-bubble {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border-soft);
  }
  .chat-error .chat-bubble {
    background: rgba(245,99,99,.07); color: var(--error); border: 1px solid rgba(245,99,99,.18);
  }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input {
    flex: 1; height: 42px; padding: 0 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font); font-size: 13px; direction: rtl;
    outline: none; transition: border-color .2s; min-width: 0;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input:disabled { opacity: .5; }
  .btn-chat-send {
    height: 42px; padding: 0 16px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-family: var(--font); font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: opacity .2s;
  }
  .btn-chat-send:hover { opacity: .88; }
  .btn-chat-send:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div class="screen" id="setup">
  <div class="setup-logo">
    <span class="setup-icon">📊</span>
    <div class="setup-title">ניתוח שוק</div>
    <div class="setup-sub">AI · Market Intelligence</div>
  </div>

  <div class="setup-form">
    <div class="form-label">מפתח Anthropic API</div>
    <input class="form-input" id="setupKey" type="password"
      placeholder="sk-ant-api03-…" autocomplete="off" />
    <div class="setup-hint">
      המפתח נשמר <strong>בדפדפן שלך בלבד</strong> — לא נשלח לשום שרת.
      ניתן לקבל מפתח ב-<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.
    </div>
    <button class="btn-primary" id="setupBtn" onclick="doSaveKey()">התחל ←</button>
  </div>
</div>

<!-- ══ MAIN SCREEN ══ -->
<div class="screen hidden" id="main">

  <header class="app-header">
    <div class="header-brand">
      <div class="header-avatar">📊</div>
      <div>
        <div class="header-name">ניתוח שוק</div>
        <div class="header-sub">AI · עברית · עדכני</div>
      </div>
    </div>
    <button class="btn-icon" onclick="openSettings()" title="הגדרות">⚙</button>
  </header>

  <div class="main-scroll" id="mainScroll">

    <div class="search-row">
      <input class="search-input" id="topicInput"
        placeholder='הזן נושא לניתוח שוק…'
        onkeydown="if(event.key==='Enter') runAnalysis()" />
      <button class="btn-analyze" id="analyzeBtn" onclick="runAnalysis()">נתח ←</button>
    </div>

    <input class="sites-input" id="sitesInput"
      placeholder="אתרים להתמקד בהם — אופציונלי: ynet.co.il, calcalist.co.il, globes.co.il"
      oninput="saveSites()" />

    <div class="mode-row">
      <span class="mode-label">מצב ניתוח:</span>
      <button class="btn-mode" id="deepModeBtn" onclick="toggleDeepMode()">⚡ מעמיק</button>
    </div>

    <div class="chips-wrap" id="chipsWrap"></div>

    <div class="status-line" id="statusLine"></div>
    <div id="compareArea"></div>
    <div id="resultArea"></div>
    <div id="historyArea"></div>

  </div>
</div>

<!-- ══ SETTINGS SHEET ══ -->
<div class="overlay" id="settingsOverlay" onclick="overlayClick(event)">
  <div class="sheet" id="settingsSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙ הגדרות</div>

    <div class="sheet-label">מפתח API</div>
    <input class="sheet-input" id="sheetKey" type="password" placeholder="sk-ant-…" />
    <button class="btn-primary" onclick="doUpdateKey()">עדכן מפתח</button>

    <div class="sheet-label" style="margin-top:22px;">נושאים מהירים — נהל שבבים</div>
    <div class="custom-chip-row">
      <input class="custom-chip-input" id="newChipInput"
        placeholder="הוסף נושא… למשל: נדל"ן בתל אביב"
        onkeydown="if(event.key==='Enter') addCustomChip()" />
      <button class="btn-add-chip" onclick="addCustomChip()">הוסף +</button>
    </div>
    <div class="custom-chips-list" id="customChipsList"></div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:16px;">
      השבבים הקבועים תמיד נשארים. שבבים מותאמים אישית ניתן למחוק.
    </div>

    <button class="btn-danger" onclick="doLogout()">מחק מפתח והתנתק</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
const STORAGE_KEY       = 'mkt_api_key_v1';
const HISTORY_KEY       = 'mkt_history_v1';
const SITES_KEY         = 'mkt_sites_v1';
const CUSTOM_CHIPS_KEY  = 'mkt_custom_chips_v1';
const history_arr  = [];
let lastTopic = '';
let deepModeActive = false;
let activeConversation = null; // { result, systemPrompt, messages, chatLog } — chat is session-only, tied to the result it was generated for

const DEFAULT_CHIPS = [
  'שוק המניות בת"א', 'נדל"ן בחיפה', 'שוק הקריפטו',
  'טכנולוגיה בישראל', 'שוק הנפט הגלובלי', 'רכב חשמלי עולמי'
];

/* ═══════════════════════════════════
   CUSTOM CHIPS
═══════════════════════════════════ */
function loadCustomChips() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_CHIPS_KEY) || '[]'); } catch { return []; }
}
function saveCustomChips(chips) {
  try { localStorage.setItem(CUSTOM_CHIPS_KEY, JSON.stringify(chips)); } catch {}
}

function renderChips() {
  const wrap = document.getElementById('chipsWrap');
  const custom = loadCustomChips();
  const all = [...DEFAULT_CHIPS, ...custom];
  wrap.innerHTML = all.map(c =>
    `<button class="chip" onclick="useChip(this)">${esc(c)}</button>`
  ).join('');
}

function renderCustomChipsList() {
  const chips = loadCustomChips();
  const el = document.getElementById('customChipsList');
  if (!chips.length) { el.innerHTML = '<span style="font-size:12px;color:var(--text-dim);">אין שבבים מותאמים עדיין.</span>'; return; }
  el.innerHTML = chips.map((c, i) =>
    `<div class="custom-chip-tag">${esc(c)}<button class="remove-custom-chip" onclick="removeCustomChip(${i})" title="הסר">✕</button></div>`
  ).join('');
}

function addCustomChip() {
  const input = document.getElementById('newChipInput');
  const val = input.value.trim();
  if (!val) return;
  const chips = loadCustomChips();
  if (!chips.includes(val) && !DEFAULT_CHIPS.includes(val)) {
    chips.push(val);
    saveCustomChips(chips);
  }
  input.value = '';
  renderChips();
  renderCustomChipsList();
}

function removeCustomChip(idx) {
  const chips = loadCustomChips();
  chips.splice(idx, 1);
  saveCustomChips(chips);
  renderChips();
  renderCustomChipsList();
}

/* ═══════════════════════════════════
   COMPARISON
═══════════════════════════════════ */
function findPreviousAnalysis(topic) {
  const topicLower = topic.toLowerCase();
  return history_arr.find(h =>
    h.topic && h.topic.toLowerCase() === topicLower
  ) || null;
}

function renderComparison(current, previous) {
  const area = document.getElementById('compareArea');
  if (!previous) { area.innerHTML = ''; return; }

  const prevPoints = new Set(previous.points.map(p => p.trim().substring(0, 40)));
  const currPoints = new Set(current.points.map(p => p.trim().substring(0, 40)));

  const newPoints  = current.points.filter(p => !prevPoints.has(p.trim().substring(0, 40)));
  const gonePoints = previous.points.filter(p => !currPoints.has(p.trim().substring(0, 40)));

  if (!newPoints.length && !gonePoints.length) { area.innerHTML = ''; return; }

  const rows = [
    ...newPoints.map(p  => `<div class="compare-row"><span class="compare-badge badge-new">חדש</span><span>${esc(p)}</span></div>`),
    ...gonePoints.map(p => `<div class="compare-row"><span class="compare-badge badge-gone">ירד</span><span>${esc(p)}</span></div>`)
  ].join('');

  area.innerHTML = `
    <div class="compare-card">
      <div class="compare-title">📈 שינויים מהניתוח הקודם</div>
      <div class="compare-prev-time">ניתוח קודם: ${previous.time}</div>
      ${rows}
    </div>`;
}

function loadHistory() {
  try {
    const saved = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    history_arr.push(...saved.slice(0, 20));
  } catch {}
}
function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history_arr.slice(0, 20))); } catch {}
}
function saveSites() {
  try { localStorage.setItem(SITES_KEY, document.getElementById('sitesInput').value); } catch {}
}
function loadSites() {
  try {
    const s = localStorage.getItem(SITES_KEY);
    if (s) document.getElementById('sitesInput').value = s;
  } catch {}
}
function toggleDeepMode() {
  deepModeActive = !deepModeActive;
  document.getElementById('deepModeBtn').classList.toggle('deep-active', deepModeActive);
}

/* ═══════════════════════════════════
   KEY HELPERS
═══════════════════════════════════ */
const getKey = () => localStorage.getItem(STORAGE_KEY) || '';
const storeKey = k => localStorage.setItem(STORAGE_KEY, k);

/* ═══════════════════════════════════
   SCREEN TRANSITIONS
═══════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s =>
    s.classList.toggle('hidden', s.id !== id)
  );
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  loadHistory();
  loadSites();
  renderChips();
  if (getKey()) {
    showScreen('main');
    if (history_arr.length > 0) {
      renderResult(history_arr[0]);
      renderHistory();
    }
  } else {
    showScreen('setup');
  }
  document.getElementById('setupKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSaveKey();
  });
});

/* ═══════════════════════════════════
   SETUP
═══════════════════════════════════ */
function doSaveKey() {
  const k = document.getElementById('setupKey').value.trim();
  if (!k.startsWith('sk-')) {
    alert('מפתח לא תקין — חייב להתחיל ב-sk-');
    return;
  }
  storeKey(k);
  showScreen('main');
}

/* ═══════════════════════════════════
   CHIPS
═══════════════════════════════════ */
function useChip(btn) {
  document.getElementById('topicInput').value = btn.textContent.trim();
  document.getElementById('topicInput').focus();
}

/* ═══════════════════════════════════
   STATUS
═══════════════════════════════════ */
function setStatus(msg, loading = false) {
  const el = document.getElementById('statusLine');
  if (!msg) { el.innerHTML = ''; return; }
  el.innerHTML = loading
    ? `<span class="loader"></span><span>${msg}</span>`
    : `<span>${msg}</span>`;
}

/* ═══════════════════════════════════
   TIME HELPERS
═══════════════════════════════════ */
function nowStr() {
  return new Date().toLocaleString('he-IL', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
function todayFull() {
  return new Date().toLocaleDateString('he-IL', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

/* ═══════════════════════════════════
   ANALYSIS
═══════════════════════════════════ */
async function runAnalysis() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;

  const apiKey = getKey();
  if (!apiKey) { showScreen('setup'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'מנתח...';
  setStatus('מחפש מידע עדכני ברשת...', true);
  document.getElementById('resultArea').innerHTML = '';
  lastTopic = topic;

  const deep      = deepModeActive;
  const sitesRaw  = document.getElementById('sitesInput').value.trim();
  const maxTokens = deep ? 4000 : 2000;
  const ptRange   = deep ? '8-10' : '4-6';

  let siteInstr = '';
  if (sitesRaw) {
    const list = sitesRaw.split(',').map(s => s.trim()).filter(Boolean).slice(0, 3);
    if (list.length)
      siteInstr = `חפש מידע **בעיקר** מהאתרים הבאים: ${list.join(', ')}. אם לא מצאת מספיק — הרחב לאתרים נוספים.\n\n`;
  }

  const systemPrompt = siteInstr + (deep
    ? `אתה סוכן ניתוח שוק מקצועי ומעמיק. היום: ${todayFull()}.
שלב 1 — בצע חיפושים מרובים ונפרדים: חיפוש על מגמות עכשוויות, חיפוש על נתונים כמותיים, חיפוש על השוואה לתקופה קודמת, וחיפוש על תחזיות עתידיות.
שלב 2 — לאחר כל החיפושים, בנה ניתוח מבוסס-נתונים מקיף בעברית בלבד.
שלב 3 — החזר JSON בלבד, ללא טקסט נוסף לפני או אחרי, ללא markdown:
{"title":"כותרת הניתוח","summary":"סיכום 3-4 משפטים מקיפים על המצב הנוכחי","points":["נקודה 1","נקודה 2","נקודה 3","נקודה 4","נקודה 5","נקודה 6","נקודה 7","נקודה 8"]}
ה-points הן ${ptRange} נקודות מעמיקות, כל אחת משפט אחד עם נתון ספציפי מהחיפוש.`
    : `אתה סוכן ניתוח שוק מקצועי. היום: ${todayFull()}.
שלב 1 — חפש תחילה ברשת מידע עדכני על הנושא.
שלב 2 — לאחר החיפוש, בנה ניתוח מבוסס-נתונים בעברית בלבד.
שלב 3 — החזר JSON בלבד, ללא טקסט נוסף לפני או אחרי, ללא markdown:
{"title":"כותרת הניתוח","summary":"סיכום 2-3 משפטים על המצב הנוכחי","points":["נקודה 1","נקודה 2","נקודה 3","נקודה 4","נקודה 5"]}
ה-points הן ${ptRange} נקודות ממוקדות, כל אחת משפט אחד עם נתון ספציפי מהחיפוש.`
  );

  const messages = [{ role: 'user', content: `נתח לעומק את השוק הבא: ${topic}` }];
  let data;

  try {
    while (true) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: maxTokens,
          system: systemPrompt,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `שגיאת שרת ${res.status}`);
      }

      data = await res.json();

      if (data.stop_reason === 'end_turn') break;

      if (data.stop_reason === 'pause_turn') {
        const queries = data.content
          .filter(b => b.type === 'server_tool_use' && b.name === 'web_search')
          .map(b => b.input?.query).filter(Boolean);
        if (queries.length) setStatus(`מחפש: ${queries[queries.length - 1]}...`, true);

        // web_search is a server-side tool — just send the turn back as-is so Claude can continue
        messages.push({ role: 'assistant', content: data.content });
      } else {
        throw new Error(`הניתוח לא הושלם (${data.stop_reason || 'unknown'}). נסה שוב.`);
      }
    }

    const textBlock = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    const jsonMatch = textBlock.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('המודל לא החזיר JSON תקין. נסה שוב.');
    const parsed = JSON.parse(jsonMatch[0]);

    messages.push({ role: 'assistant', content: data.content });

    const result = { topic, ...parsed, time: nowStr() };
    const previous = findPreviousAnalysis(topic);
    activeConversation = { result, systemPrompt, messages, chatLog: [] };
    renderResult(result);
    renderComparison(result, previous);
    pushHistory(result);
    setStatus('');

  } catch (e) {
    console.error(e);
    document.getElementById('resultArea').innerHTML = buildError(e.message);
    setStatus('');
  }

  btn.disabled = false;
  btn.textContent = 'נתח ←';
}

/* ═══════════════════════════════════
   RENDER RESULT
═══════════════════════════════════ */
function renderResult(r) {
  const card = document.createElement('div');
  card.className   = 'result-card';
  card.dataset.json = JSON.stringify(r);

  const pts = r.points.map((p, i) => `
    <li class="point-item">
      <span class="point-num">${String(i + 1).padStart(2, '0')}</span>
      <span>${esc(p)}</span>
    </li>`).join('');

  const isActive = activeConversation && activeConversation.result === r;
  const chatHtml = isActive ? `
    <div class="chat-section">
      <p class="chat-label">💬 שאל את הסוכן על הניתוח הזה</p>
      <div class="chat-log" id="chatLogArea"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="למשל: מה ההשלכות על המשקיע הקטן?"
          onkeydown="if(event.key==='Enter') sendChatMessage()" />
        <button class="btn-chat-send" id="chatSendBtn" onclick="sendChatMessage()">שלח</button>
      </div>
    </div>` : '';

  card.innerHTML = `
    <div class="card-top">
      <span class="card-topic">${esc(r.topic)}</span>
      <span class="card-time">${r.time}</span>
    </div>
    <h2 class="card-title">${esc(r.title)}</h2>
    <p class="card-summary">${esc(r.summary)}</p>
    <p class="points-label">נקודות עיקריות</p>
    <ul class="points-list">${pts}</ul>
    <div class="card-actions">
      <button class="btn-action" data-action="copy">⎘ העתק</button>
      <button class="btn-action" data-action="save">⬇ שמור MD</button>
    </div>
    ${chatHtml}`;

  card.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const obj = JSON.parse(card.dataset.json);
    if (btn.dataset.action === 'copy') doCopy(btn, obj);
    if (btn.dataset.action === 'save') doSaveMd(btn, obj);
  });

  const area = document.getElementById('resultArea');
  area.innerHTML = '';
  area.appendChild(card);
  document.getElementById('mainScroll').scrollTop = 0;

  if (isActive) renderChatLog();
}

/* ═══════════════════════════════════
   CHAT WITH AGENT ABOUT THE ANALYSIS
═══════════════════════════════════ */
function renderChatLog() {
  const area = document.getElementById('chatLogArea');
  if (!area || !activeConversation) return;
  area.innerHTML = activeConversation.chatLog.map(m =>
    `<div class="chat-msg chat-${m.role}"><span class="chat-bubble">${esc(m.text)}</span></div>`
  ).join('');
  area.scrollTop = area.scrollHeight;
}

async function sendChatMessage() {
  if (!activeConversation) return;
  const input   = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  const question = input.value.trim();
  if (!question) return;

  const apiKey = getKey();
  if (!apiKey) { showScreen('setup'); return; }

  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  activeConversation.chatLog.push({ role: 'user', text: question });
  renderChatLog();

  const convo = activeConversation;
  convo.messages.push({ role: 'user', content: question });

  const followUpSystem = convo.systemPrompt +
    '\n\nהמשתמש שואל כעת שאלת המשך על הניתוח שביצעת. ענה בעברית, בטקסט חופשי קצר ולעניין (לא JSON), והתבסס על הניתוח והחיפושים שכבר נעשו. אם צריך מידע נוסף ועדכני, אפשר לבצע חיפוש נוסף.';

  try {
    let data;
    while (true) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1200,
          system: followUpSystem,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: convo.messages
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `שגיאת שרת ${res.status}`);
      }

      data = await res.json();

      if (data.stop_reason === 'end_turn') break;

      if (data.stop_reason === 'pause_turn') {
        convo.messages.push({ role: 'assistant', content: data.content });
      } else {
        throw new Error(`התשובה לא הושלמה (${data.stop_reason || 'unknown'}). נסה שוב.`);
      }
    }

    convo.messages.push({ role: 'assistant', content: data.content });
    const answer = data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
    convo.chatLog.push({ role: 'assistant', text: answer || '(לא התקבלה תשובה)' });

  } catch (e) {
    console.error(e);
    convo.chatLog.push({ role: 'error', text: e.message });
  }

  renderChatLog();
  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

/* ═══════════════════════════════════
   HISTORY
═══════════════════════════════════ */
function pushHistory(r) {
  history_arr.unshift(r);
  saveHistory();
  renderHistory();
}

function renderHistory() {
  const area = document.getElementById('historyArea');
  if (history_arr.length < 2) { area.innerHTML = ''; return; }

  const items = history_arr.slice(1, 9).map((h, i) => `
    <div class="history-item" data-idx="${i + 1}">
      <span class="history-title">${esc(h.title)}</span>
      <span class="history-time">${h.time}</span>
    </div>`).join('');

  area.innerHTML = `<p class="section-label">ניתוחים קודמים</p>${items}`;

  area.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      renderResult(history_arr[Number(el.dataset.idx)]);
      document.getElementById('compareArea').innerHTML = '';
    });
  });
}

/* ═══════════════════════════════════
   COPY
═══════════════════════════════════ */
function doCopy(btn, r) {
  const text = [
    `ניתוח שוק: ${r.title}`,
    '',
    `נושא: ${r.topic}  |  תאריך: ${r.time}`,
    '',
    r.summary,
    '',
    'נקודות עיקריות:',
    ...r.points.map((p, i) => `${i + 1}. ${p}`)
  ].join('\n');

  navigator.clipboard.writeText(text)
    .then(() => {
      btn.textContent = '✓ הועתק';
      btn.classList.add('active');
      setTimeout(() => { btn.textContent = '⎘ העתק'; btn.classList.remove('active'); }, 2200);
    })
    .catch(() => alert('לא ניתן להעתיק — נסה ב-Chrome/Safari'));
}

/* ═══════════════════════════════════
   SAVE MARKDOWN
═══════════════════════════════════ */
function doSaveMd(btn, r) {
  const md = [
    `# ניתוח שוק: ${r.title}`,
    '',
    `**נושא:** ${r.topic}  `,
    `**תאריך:** ${r.time}`,
    '',
    '## סיכום',
    '',
    r.summary,
    '',
    '## נקודות עיקריות',
    '',
    ...r.points.map((p, i) => `${i + 1}. ${p}`),
    ''
  ].join('\n');

  const blob = new Blob(['﻿' + md], { type: 'text/markdown;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const safe = r.topic.replace(/[\s"'/\\<>:|?*]+/g, '_').substring(0, 40);
  a.href = url;
  a.download = `ניתוח_שוק_${safe}.md`;
  a.click();
  URL.revokeObjectURL(url);

  btn.textContent = '✓ נשמר';
  btn.classList.add('active');
  setTimeout(() => { btn.textContent = '⬇ שמור MD'; btn.classList.remove('active'); }, 2500);
}

/* ═══════════════════════════════════
   ERROR CARD
═══════════════════════════════════ */
function buildError(msg) {
  return `<div class="error-card">
    <span class="error-icon">⚠</span>
    <div>
      <div>${esc(msg)}</div>
      <button class="btn-retry" onclick="runAnalysis()">נסה שוב</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════
   SETTINGS SHEET
═══════════════════════════════════ */
function openSettings() {
  const k = getKey();
  document.getElementById('sheetKey').value = k
    ? '••••••' + k.slice(-4)
    : '';
  renderCustomChipsList();
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
}

function doUpdateKey() {
  const k = document.getElementById('sheetKey').value.trim();
  if (k.startsWith('sk-')) {
    storeKey(k);
    closeSettings();
  } else if (!k || k.includes('•')) {
    closeSettings();
  } else {
    alert('מפתח לא תקין — חייב להתחיל ב-sk-');
  }
}

function doLogout() {
  if (!confirm('למחוק את המפתח השמור ולחזור למסך ההגדרה?')) return;
  localStorage.removeItem(STORAGE_KEY);
  closeSettings();
  document.getElementById('resultArea').innerHTML  = '';
  document.getElementById('historyArea').innerHTML = '';
  history_arr.length = 0;
  showScreen('setup');
}

/* ═══════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

/* ═══════════════════════════════════
   UTILS
═══════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
